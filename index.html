<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mock GSTN Regulatory Portal - Displaying GST Network regulatory data and compliance requirements." />
    <meta name="keywords" content="GSTN, GST, Regulatory, Portal, Compliance" />
    <meta name="author" content="VenkateshReddy007" />
    <meta name="theme-color" content="#355e3b" />
    <title>GSTN Regulatory Portal (Mock)</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #f7faf5; color: #1f3a1f; }
      h1 { color: #355e3b; }
      .note { background: #e6f2dd; border-left: 4px solid #5b8c5a; padding: 10px; margin: 16px 0; }
      table { border-collapse: collapse; width: 100%; background: #fff; }
      th, td { border: 1px solid #c8d8c0; padding: 8px; text-align: left; font-size: 14px; }
      th { background: #d3e6cb; color: #234623; }
      code { background: #eef6e8; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>GSTN Regulatory Portal (Mock)</h1>
    <div class="note">This is a mock portal for RegGraph AI demo.</div>
    <p id="meta"></p>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Title</th><th>Category</th><th>Value</th><th>Unit</th><th>Effective Date</th><th>State</th><th>Applies To</th><th>Description</th>
        </tr>
      </thead>
      <tbody id="reg-body"></tbody>
    </table>
    <script>
      // Fallback data in case fetch fails
      const fallbackData = {
        "portal": "GSTN Regulatory Portal",
        "version": "1.2.0",
        "last_updated": "2026-05-09T00:00:00Z",
        "hash_check": "v1_gstn_realistic",
        "regulations": [
          {
            "id": "GST_LATE_FEE_001",
            "title": "GSTR-3B Maximum Late Fee Cap",
            "category": "late_fee",
            "value": 69,
            "unit": "INR_PER_DAY",
            "description": "Maximum late fee for delayed GSTR-3B filing capped at ₹250/day subject to a maximum of ₹5000.",
            "effective_date": "2026-05-01",
            "applies_to": ["GST_REGISTERED"],
            "state": "ALL"
          },
          {
            "id": "GST_ITC_MATCHING_002",
            "title": "ITC Claim Tolerance Limit",
            "category": "compliance_rule",
            "value": 5,
            "unit": "PERCENT",
            "description": "Input Tax Credit (ITC) claim restricted to 5% of eligible credit available in GSTR-2B.",
            "effective_date": "2026-04-01",
            "applies_to": ["GST_REGISTERED"],
            "state": "ALL"
          },
          {
            "id": "GST_SLAB_STANDARD_001",
            "title": "Standard GST Rate",
            "category": "tax_slab",
            "value": 18,
            "unit": "PERCENT",
            "description": "Standard GST rate applicable to services and general goods.",
            "effective_date": "2017-07-01",
            "applies_to": ["GST_REGISTERED"],
            "state": "ALL"
          },
          {
            "id": "GST_THRESHOLD_001",
            "title": "GST Registration Turnover Threshold",
            "category": "threshold",
            "value": 2000000,
            "unit": "INR",
            "description": "Annual turnover above which GST registration becomes mandatory for service providers.",
            "effective_date": "2019-04-01",
            "applies_to": ["ALL_BUSINESSES"],
            "state": "ALL"
          }
        ]
      };

      function loadTable(data) {
        document.getElementById("meta").innerHTML = "Version: <code>" + data.version + "</code> | Last Updated: <code>" + data.last_updated + "</code> | Hash: <code>" + data.hash_check + "</code>";
        const body = document.getElementById("reg-body");
        body.innerHTML = ""; // Clear any existing rows
        data.regulations.forEach((reg) => {
          const tr = document.createElement("tr");
          tr.innerHTML = "<td>" + reg.id + "</td><td>" + reg.title + "</td><td>" + reg.category + "</td><td>" + reg.value + "</td><td>" + reg.unit + "</td><td>" + reg.effective_date + "</td><td>" + reg.state + "</td><td>" + reg.applies_to.join(", ") + "</td><td>" + reg.description + "</td>";
          body.appendChild(tr);
        });
      }

      // Try to fetch from file, fallback to embedded data
      fetch("./regulations.json")
        .then((r) => {
          if (!r.ok) throw new Error("Failed to fetch regulations.json");
          return r.json();
        })
        .then((data) => loadTable(data))
        .catch((error) => {
          console.log("Using fallback data:", error);
          loadTable(fallbackData);
        });
    </script>
  </body>
</html>
